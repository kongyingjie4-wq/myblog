<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>我的博客</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
        h1 { color: #333; border-bottom: 2px solid #007bff; padding-bottom: 10px; }
        .article-item { margin: 20px 0; padding: 15px; border: 1px solid #eee; border-radius: 5px; }
        .article-item h2 { margin: 0 0 8px 0; }
        .article-item a { color: #007bff; text-decoration: none; }
        .meta { color: #999; font-size: 14px; }
    </style>
</head>
<body>
    <h1>我的博客</h1>
    {% for article in articles %}
    <div class="article-item">
        <h2><a href="/blog/{{ article.pk }}/">{{ article.title }}</a></h2>
        <div class="meta">{{ article.created_at|date:"Y-m-d" }} · 阅读 {{ article.views }} 次</div>
    </div>
    {% endfor %}
</body>
</html>
